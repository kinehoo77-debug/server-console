<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Server Console{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="brand">server-console</div>
      <nav class="nav-menu">
        <a href="{{ url_for('main.dashboard') }}" class="{% if active_page == 'dashboard' %}active{% endif %}">系统监控</a>
        <a href="{{ url_for('main.files_page') }}" class="{% if active_page == 'files' %}active{% endif %}">文件管理</a>
        <a href="{{ url_for('main.logs_page') }}" class="{% if active_page == 'logs' %}active{% endif %}">系统日志</a>
        <a href="{{ docker_panel_url }}" target="_blank" rel="noopener">Docker 面板</a>
      </nav>
      <form method="post" action="{{ url_for('auth.logout') }}" class="mt-auto">
        <button class="btn btn-light w-100">退出登录</button>
      </form>
    </aside>

    <main class="content">
      <header class="topbar">
        <div>
          <h1 class="page-title">{% block page_title %}控制台{% endblock %}</h1>
          <div class="sub-title">欢迎回来，管理员</div>
        </div>
        <div id="clock" class="clock"></div>
      </header>
      {% block content %}{% endblock %}
    </main>
  </div>

  <div class="modal fade" id="textEditorModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">在线编辑</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div id="editorFilePath" class="small text-secondary mb-2"></div>
          <textarea id="editorTextarea" class="form-control editor-textarea" spellcheck="false"></textarea>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">关闭</button>
          <button type="button" id="saveTextBtn" class="btn btn-primary">保存</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="previewModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">文件预览</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" id="previewBody"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  <script src="{{ url_for('static', filename='js/common.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
